name: Actualizar sismos

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas scikit-learn

      - name: Ejecutar script de actualizacion
        run: python scripts/actualizar_historico.py

      - name: Commitear cambios si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historico_clusters.json data/historico_eventos.json
          git diff --staged --quiet || git commit -m "Actualizar datos historicos de sismos [skip ci]"
          git push
